<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eru Admin — Moderation Panel</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: #0f2044;
      color: #fff;
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,.25);
    }
    header h1 { font-size: 18px; font-weight: 700; letter-spacing: .5px; }
    header .right { display: flex; align-items: center; gap: 16px; }
    #refresh-badge {
      font-size: 12px;
      color: #94a3b8;
    }
    #logout-btn {
      background: transparent;
      border: 1px solid rgba(255,255,255,.35);
      color: #fff;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: background .15s;
    }
    #logout-btn:hover { background: rgba(255,255,255,.1); }

    /* ── Login screen ── */
    #login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 56px);
    }
    .login-card {
      background: #fff;
      border-radius: 12px;
      padding: 40px 36px;
      width: 380px;
      box-shadow: 0 4px 24px rgba(0,0,0,.1);
    }
    .login-card h2 { font-size: 20px; margin-bottom: 8px; color: #0f2044; }
    .login-card p { font-size: 13px; color: #64748b; margin-bottom: 24px; }
    .login-card label { font-size: 13px; font-weight: 600; color: #374151; display: block; margin-bottom: 6px; }
    .login-card input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: border .15s;
    }
    .login-card input:focus { border-color: #3b82f6; }
    .login-card button {
      width: 100%;
      margin-top: 16px;
      padding: 11px;
      background: #0f2044;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
    }
    .login-card button:hover { background: #1e3a6e; }
    #login-error { color: #ef4444; font-size: 13px; margin-top: 10px; }

    /* ── Main layout ── */
    #app { display: none; }
    main { max-width: 900px; margin: 0 auto; padding: 24px 16px; }

    /* ── Stats bar ── */
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: #fff;
      border-radius: 10px;
      padding: 16px 18px;
      box-shadow: 0 1px 4px rgba(0,0,0,.07);
      text-align: center;
    }
    .stat-card .value {
      font-size: 28px;
      font-weight: 700;
      color: #0f2044;
      line-height: 1;
    }
    .stat-card .label {
      font-size: 12px;
      color: #64748b;
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: .5px;
    }
    .stat-card.pending .value { color: #f59e0b; }
    .stat-card.approved .value { color: #10b981; }
    .stat-card.declined .value { color: #ef4444; }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 20px;
      border-bottom: 2px solid #e5e7eb;
    }
    .tab-btn {
      padding: 10px 20px;
      border: none;
      background: none;
      font-size: 14px;
      font-weight: 600;
      color: #6b7280;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: color .15s, border-color .15s;
    }
    .tab-btn.active { color: #0f2044; border-bottom-color: #0f2044; }
    .tab-btn:hover:not(.active) { color: #374151; }

    /* ── Queue list ── */
    #queue-list { display: flex; flex-direction: column; gap: 14px; }
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #94a3b8;
    }
    .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
    .empty-state p { font-size: 15px; }

    /* ── Content cards ── */
    .mod-card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 1px 6px rgba(0,0,0,.08);
      overflow: hidden;
      border: 1px solid #e5e7eb;
      transition: box-shadow .15s;
    }
    .mod-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.12); }
    .card-body { padding: 18px 20px; }

    /* Card header row */
    .card-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }
    .avatar {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: #e0e7ff;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 16px; color: #4f46e5;
      flex-shrink: 0;
      overflow: hidden;
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; }
    .user-info { flex: 1; }
    .user-name { font-size: 14px; font-weight: 600; }
    .user-handle { font-size: 12px; color: #6b7280; }
    .card-meta { text-align: right; font-size: 12px; color: #94a3b8; }
    .content-type-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .5px;
      background: #dbeafe;
      color: #1d4ed8;
      margin-bottom: 4px;
    }

    /* Content body */
    .card-text {
      font-size: 14px;
      line-height: 1.6;
      color: #374151;
      margin-bottom: 12px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .card-media { margin-bottom: 12px; }
    .card-media img, .card-media video {
      max-width: 100%;
      max-height: 200px;
      border-radius: 8px;
      object-fit: cover;
      display: block;
    }

    /* AI risk scores */
    .risk-scores {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .risk-chip {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }
    .risk-chip.low { background: #dcfce7; color: #166534; }
    .risk-chip.medium { background: #fef3c7; color: #92400e; }
    .risk-chip.high { background: #fee2e2; color: #991b1b; }
    .risk-chip .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
    }
    .risk-chip.low .dot { background: #16a34a; }
    .risk-chip.medium .dot { background: #d97706; }
    .risk-chip.high .dot { background: #dc2626; }

    /* Card actions */
    .card-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 20px;
      background: #f9fafb;
      border-top: 1px solid #f0f0f0;
    }
    .btn-approve {
      padding: 8px 20px;
      background: #10b981;
      color: #fff;
      border: none;
      border-radius: 7px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
    }
    .btn-approve:hover { background: #059669; }
    .btn-approve:disabled { background: #a7f3d0; cursor: not-allowed; }

    .decline-group { display: flex; gap: 6px; margin-left: auto; }
    .reason-select {
      padding: 8px 10px;
      border: 1px solid #d1d5db;
      border-radius: 7px;
      font-size: 13px;
      color: #374151;
      background: #fff;
      cursor: pointer;
      outline: none;
    }
    .reason-select:focus { border-color: #ef4444; }
    .btn-decline {
      padding: 8px 18px;
      background: #ef4444;
      color: #fff;
      border: none;
      border-radius: 7px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
    }
    .btn-decline:hover { background: #dc2626; }
    .btn-decline:disabled { background: #fca5a5; cursor: not-allowed; }

    /* Toast notifications */
    #toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 999;
    }
    .toast {
      padding: 12px 18px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      color: #fff;
      box-shadow: 0 4px 12px rgba(0,0,0,.2);
      animation: slideIn .2s ease;
    }
    .toast.success { background: #10b981; }
    .toast.error   { background: #ef4444; }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Loading skeleton */
    .skeleton {
      background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
      background-size: 200% 100%;
      animation: shimmer 1.2s infinite;
      border-radius: 8px;
    }
    @keyframes shimmer {
      0%   { background-position: -200% 0; }
      100% { background-position:  200% 0; }
    }

    /* Pagination */
    .pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-top: 24px;
    }
    .pagination button {
      padding: 8px 16px;
      border: 1px solid #d1d5db;
      background: #fff;
      border-radius: 7px;
      font-size: 13px;
      cursor: pointer;
      transition: background .15s;
    }
    .pagination button:hover:not(:disabled) { background: #f3f4f6; }
    .pagination button:disabled { opacity: .4; cursor: not-allowed; }
    .pagination span { font-size: 13px; color: #6b7280; }

    @media (max-width: 600px) {
      .stats-bar { grid-template-columns: repeat(2, 1fr); }
      .card-actions { flex-wrap: wrap; }
      .decline-group { margin-left: 0; width: 100%; }
    }
  </style>
</head>
<body>

<!-- ── Header ── -->
<header>
  <h1>Eru Moderation</h1>
  <div class="right">
    <span id="refresh-badge">Auto-refresh in <span id="countdown">30</span>s</span>
    <button id="logout-btn">Logout</button>
  </div>
</header>

<!-- ── Login Screen ── -->
<div id="login-screen">
  <div class="login-card">
    <h2>Admin Login</h2>
    <p>Enter your admin Bearer token to access the moderation panel.</p>
    <label for="token-input">Bearer Token</label>
    <input type="password" id="token-input" placeholder="eyJhbGciOi..." autocomplete="off" />
    <button id="login-btn">Sign In</button>
    <p id="login-error"></p>
  </div>
</div>

<!-- ── Main App ── -->
<div id="app">
  <main>
    <!-- Stats bar -->
    <div class="stats-bar">
      <div class="stat-card">
        <div class="value" id="stat-reviewed">—</div>
        <div class="label">Reviewed Today</div>
      </div>
      <div class="stat-card approved">
        <div class="value" id="stat-approved">—</div>
        <div class="label">Approved</div>
      </div>
      <div class="stat-card declined">
        <div class="value" id="stat-declined">—</div>
        <div class="label">Declined</div>
      </div>
      <div class="stat-card pending">
        <div class="value" id="stat-pending">—</div>
        <div class="label">Pending</div>
      </div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" data-tab="pending">Pending</button>
      <button class="tab-btn" data-tab="appeals">Appeals</button>
    </div>

    <!-- Queue -->
    <div id="queue-list"></div>

    <!-- Pagination -->
    <div class="pagination">
      <button id="prev-btn" disabled>← Prev</button>
      <span id="page-info">Page 1</span>
      <button id="next-btn" disabled>Next →</button>
    </div>
  </main>
</div>

<!-- Toast container -->
<div id="toast-container"></div>

<script>
  const API = window.location.origin + '/api/v1';

  // ── Moderation reason codes ──
  const MOD_REASONS = {
    'MOD-01': 'Hate speech / discrimination',
    'MOD-02': 'Harassment or bullying',
    'MOD-03': 'Graphic violence or gore',
    'MOD-04': 'Adult / explicit content',
    'MOD-05': 'Spam or misleading info',
    'MOD-06': 'Intellectual property violation',
    'MOD-07': 'Other policy violation',
  };

  // ── State ──
  let token = localStorage.getItem('eru_admin_token') || '';
  let currentPage = 1;
  let totalItems = 0;
  const PAGE_SIZE = 20;
  let refreshTimer = null;
  let countdownTimer = null;
  let countdownVal = 30;

  // ── DOM refs ──
  const loginScreen  = document.getElementById('login-screen');
  const app          = document.getElementById('app');
  const tokenInput   = document.getElementById('token-input');
  const loginBtn     = document.getElementById('login-btn');
  const loginError   = document.getElementById('login-error');
  const logoutBtn    = document.getElementById('logout-btn');
  const queueList    = document.getElementById('queue-list');
  const prevBtn      = document.getElementById('prev-btn');
  const nextBtn      = document.getElementById('next-btn');
  const pageInfo     = document.getElementById('page-info');
  const countdown    = document.getElementById('countdown');

  // ── Utility: time-ago ──
  function timeAgo(dateStr) {
    const diff = Date.now() - new Date(dateStr).getTime();
    const mins = Math.floor(diff / 60000);
    if (mins < 1)  return 'just now';
    if (mins < 60) return `${mins}m ago`;
    const hrs = Math.floor(mins / 60);
    if (hrs < 24)  return `${hrs}h ago`;
    return `${Math.floor(hrs / 24)}d ago`;
  }

  // ── Utility: risk chip ──
  function riskChip(label, score) {
    if (score === null || score === undefined) return '';
    const pct = Math.round(score * 100);
    const cls = pct < 20 ? 'low' : pct <= 50 ? 'medium' : 'high';
    return `<span class="risk-chip ${cls}"><span class="dot"></span>${label}: ${pct}%</span>`;
  }

  // ── Utility: initials avatar ──
  function avatarHtml(user) {
    if (user.avatarUrl) {
      return `<div class="avatar"><img src="${user.avatarUrl}" alt="${user.name}" onerror="this.parentElement.textContent='${(user.name||'?')[0].toUpperCase()}'"/></div>`;
    }
    return `<div class="avatar">${(user.name || '?')[0].toUpperCase()}</div>`;
  }

  // ── Toast ──
  function showToast(msg, type = 'success') {
    const t = document.createElement('div');
    t.className = `toast ${type}`;
    t.textContent = msg;
    document.getElementById('toast-container').appendChild(t);
    setTimeout(() => t.remove(), 3500);
  }

  // ── Auth ──
  async function checkToken(tok) {
    const res = await fetch(`${API}/admin/moderation/stats`, {
      headers: { Authorization: `Bearer ${tok}` },
    });
    return res.ok;
  }

  loginBtn.addEventListener('click', async () => {
    const tok = tokenInput.value.trim();
    if (!tok) { loginError.textContent = 'Please enter a token.'; return; }
    loginBtn.disabled = true;
    loginBtn.textContent = 'Checking…';
    loginError.textContent = '';
    const ok = await checkToken(tok).catch(() => false);
    loginBtn.disabled = false;
    loginBtn.textContent = 'Sign In';
    if (!ok) { loginError.textContent = 'Invalid token or not an admin.'; return; }
    token = tok;
    localStorage.setItem('eru_admin_token', token);
    enterApp();
  });

  tokenInput.addEventListener('keydown', e => { if (e.key === 'Enter') loginBtn.click(); });

  logoutBtn.addEventListener('click', () => {
    token = '';
    localStorage.removeItem('eru_admin_token');
    clearInterval(refreshTimer);
    clearInterval(countdownTimer);
    app.style.display = 'none';
    loginScreen.style.display = 'flex';
    tokenInput.value = '';
  });

  // ── Tabs ──
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentPage = 1;
      loadQueue();
    });
  });

  // ── Pagination ──
  prevBtn.addEventListener('click', () => { currentPage--; loadQueue(); });
  nextBtn.addEventListener('click', () => { currentPage++; loadQueue(); });

  // ── API helpers ──
  function authFetch(url, opts = {}) {
    return fetch(url, {
      ...opts,
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}`, ...(opts.headers || {}) },
    });
  }

  async function loadStats() {
    try {
      const res = await authFetch(`${API}/admin/moderation/stats`);
      if (!res.ok) return;
      const data = await res.json();
      document.getElementById('stat-reviewed').textContent = data.reviewed ?? 0;
      document.getElementById('stat-approved').textContent = data.approved ?? 0;
      document.getElementById('stat-declined').textContent = data.declined ?? 0;
      document.getElementById('stat-pending').textContent  = data.pending  ?? 0;
    } catch (_) {}
  }

  async function loadQueue() {
    queueList.innerHTML = `<div style="padding:40px;text-align:center;color:#94a3b8;">Loading…</div>`;
    try {
      const res = await authFetch(`${API}/admin/moderation/queue?page=${currentPage}&limit=${PAGE_SIZE}`);
      if (!res.ok) { queueList.innerHTML = `<div style="padding:40px;text-align:center;color:#ef4444;">Failed to load queue.</div>`; return; }
      const { items, total } = await res.json();
      totalItems = total;
      renderQueue(items);
      pageInfo.textContent = `Page ${currentPage} of ${Math.max(1, Math.ceil(total / PAGE_SIZE))} (${total} items)`;
      prevBtn.disabled = currentPage <= 1;
      nextBtn.disabled = currentPage >= Math.ceil(total / PAGE_SIZE);
    } catch (_) {
      queueList.innerHTML = `<div style="padding:40px;text-align:center;color:#ef4444;">Network error.</div>`;
    }
  }

  function renderQueue(items) {
    if (!items || items.length === 0) {
      queueList.innerHTML = `
        <div class="empty-state">
          <div class="icon">✅</div>
          <p>Queue is empty — nothing to review!</p>
        </div>`;
      return;
    }
    queueList.innerHTML = items.map(item => buildCard(item)).join('');
    // Attach action listeners
    items.forEach(item => {
      const approveBtn = document.getElementById(`approve-${item.id}`);
      const declineBtn = document.getElementById(`decline-${item.id}`);
      approveBtn?.addEventListener('click', () => handleApprove(item.id, approveBtn, declineBtn));
      declineBtn?.addEventListener('click',  () => handleDecline(item.id, approveBtn, declineBtn));
    });
  }

  function buildCard(item) {
    const c = item.content || {};
    const user = c.user || {};
    const media = (c.media || [])[0];

    // Risk scores (stored as floats 0-1 on the queue item)
    const scores = [
      riskChip('Hate', item.hateScore),
      riskChip('Violence', item.violenceScore),
      riskChip('Adult', item.adultScore),
      riskChip('Spam', item.spamScore),
    ].filter(Boolean).join('');

    const mediaHtml = media ? (() => {
      const url = media.url || '';
      if (media.type === 'video' || url.match(/\.(mp4|mov|webm)/i)) {
        return `<div class="card-media"><video src="${url}" muted playsinline preload="metadata" style="max-height:160px;border-radius:8px;"></video></div>`;
      }
      return `<div class="card-media"><img src="${url}" alt="media" loading="lazy" /></div>`;
    })() : '';

    const reasonOptions = Object.entries(MOD_REASONS)
      .map(([code, label]) => `<option value="${code}">${code} — ${label}</option>`)
      .join('');

    return `
      <div class="mod-card" id="card-${item.id}">
        <div class="card-body">
          <div class="card-header">
            ${avatarHtml(user)}
            <div class="user-info">
              <div class="user-name">${escHtml(user.name || 'Unknown')}</div>
              <div class="user-handle">@${escHtml(user.username || '—')}</div>
            </div>
            <div class="card-meta">
              <div class="content-type-badge">${escHtml(c.type || 'post')}</div>
              <div>${timeAgo(item.createdAt)}</div>
            </div>
          </div>

          ${c.caption || c.text ? `<div class="card-text">${escHtml(c.caption || c.text || '')}</div>` : ''}
          ${mediaHtml}

          ${scores ? `<div class="risk-scores">${scores}</div>` : ''}
        </div>
        <div class="card-actions">
          <button class="btn-approve" id="approve-${item.id}">✓ Approve</button>
          <div class="decline-group">
            <select class="reason-select" id="reason-${item.id}">
              ${reasonOptions}
            </select>
            <button class="btn-decline" id="decline-${item.id}">✕ Decline</button>
          </div>
        </div>
      </div>`;
  }

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  async function handleApprove(id, approveBtn, declineBtn) {
    approveBtn.disabled = true;
    declineBtn.disabled = true;
    approveBtn.textContent = 'Approving…';
    try {
      const res = await authFetch(`${API}/admin/moderation/${id}/approve`, { method: 'POST' });
      if (res.ok) {
        document.getElementById(`card-${id}`)?.remove();
        showToast('Content approved!', 'success');
        await Promise.all([loadStats(), maybeRefreshIfEmpty()]);
      } else {
        const err = await res.json().catch(() => ({}));
        showToast(err.error || 'Approve failed.', 'error');
        approveBtn.disabled = false;
        declineBtn.disabled = false;
        approveBtn.textContent = '✓ Approve';
      }
    } catch (_) {
      showToast('Network error.', 'error');
      approveBtn.disabled = false;
      declineBtn.disabled = false;
      approveBtn.textContent = '✓ Approve';
    }
  }

  async function handleDecline(id, approveBtn, declineBtn) {
    const code = document.getElementById(`reason-${id}`)?.value;
    if (!code) { showToast('Select a reason first.', 'error'); return; }
    approveBtn.disabled = true;
    declineBtn.disabled = true;
    declineBtn.textContent = 'Declining…';
    try {
      const res = await authFetch(`${API}/admin/moderation/${id}/decline`, {
        method: 'POST',
        body: JSON.stringify({ code }),
      });
      if (res.ok) {
        document.getElementById(`card-${id}`)?.remove();
        showToast(`Declined (${code})`, 'success');
        await Promise.all([loadStats(), maybeRefreshIfEmpty()]);
      } else {
        const err = await res.json().catch(() => ({}));
        showToast(err.error || 'Decline failed.', 'error');
        approveBtn.disabled = false;
        declineBtn.disabled = false;
        declineBtn.textContent = '✕ Decline';
      }
    } catch (_) {
      showToast('Network error.', 'error');
      approveBtn.disabled = false;
      declineBtn.disabled = false;
      declineBtn.textContent = '✕ Decline';
    }
  }

  async function maybeRefreshIfEmpty() {
    if (queueList.querySelectorAll('.mod-card').length === 0) {
      await loadQueue();
    }
  }

  // ── Auto-refresh ──
  function startRefresh() {
    countdownVal = 30;
    countdown.textContent = countdownVal;

    clearInterval(refreshTimer);
    clearInterval(countdownTimer);

    countdownTimer = setInterval(() => {
      countdownVal--;
      countdown.textContent = countdownVal;
      if (countdownVal <= 0) {
        countdownVal = 30;
        countdown.textContent = countdownVal;
      }
    }, 1000);

    refreshTimer = setInterval(async () => {
      await Promise.all([loadStats(), loadQueue()]);
    }, 30000);
  }

  // ── Entry point ──
  async function enterApp() {
    loginScreen.style.display = 'none';
    app.style.display = 'block';
    await Promise.all([loadStats(), loadQueue()]);
    startRefresh();
  }

  // ── Boot ──
  if (token) {
    checkToken(token).then(ok => {
      if (ok) { enterApp(); }
      else { token = ''; localStorage.removeItem('eru_admin_token'); }
    });
  }
</script>
</body>
</html>
